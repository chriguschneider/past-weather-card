# SonarCloud — added v1.4.2 (issue #19) but NOT YET ACTIVATED.
#
# Activation requires (one-time, by repo owner):
#   1. Sign in at https://sonarcloud.io with GitHub
#   2. Create org "chriguschneider" (free for public repos)
#   3. Import this repo, copy the projectKey + organization values
#      shown in the SonarCloud UI here, replacing the placeholders below
#   4. Repo Secrets → SONAR_TOKEN (generated at sonarcloud.io →
#      My Account → Security)
#   5. Enable .github/workflows/sonarcloud.yml (currently has a guard)
#
# Once active: every PR gets a SonarCloud quality-gate comment with
# Cognitive Complexity, Code Smells, Security Hotspots, Duplications,
# and Coverage trend (LCOV from coverage/lcov.info — already produced
# by `npm run coverage` since the v1.4.2 vitest.config update).

sonar.projectKey=chriguschneider_weather-station-card
sonar.organization=chriguschneider

sonar.sources=src
sonar.tests=tests,tests-e2e
sonar.test.inclusions=tests/**/*.test.js,tests-e2e/**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Exclude generated bundle, snapshots, and node_modules from analysis.
sonar.exclusions=dist/**,node_modules/**,coverage/**,playwright-report/**,test-results/**,tests-e2e/snapshots/**

# main.ts uses @ts-nocheck per architecture decision (HA integration
# boundary). Mirror that here so SonarCloud doesn't double-report.
sonar.javascript.exclusions=src/main.ts

# Coverage scope must mirror vitest.config.js `coverage.include`. The
# unit-tested modules listed there feed into coverage/lcov.info; the
# files below are exercised only by Playwright E2E (#14) which doesn't
# pipe coverage to lcov, so Sonar would otherwise count them as 100 %
# uncovered and the dashboard reports ~77 % line coverage instead of
# the real ~92 %. Keep this list in sync with vitest.config.js when
# files move between unit and E2E coverage. (Tracked in #42.)
sonar.coverage.exclusions=\
  src/main.ts,\
  src/const.ts,\
  src/locale.ts,\
  src/weather-station-card-editor.ts,\
  src/editor/**,\
  src/chart/draw.ts,\
  src/chart/orchestrator.ts,\
  src/chart/styles.ts

# Per-language string tables intentionally repeat the same units /
# cardinal-direction / condition-id keys per language to keep adding
# a new locale a one-block paste. See the leading comment in
# src/locale.ts for the rationale. CPD's ~95 % duplication report on
# this file is therefore noise, not a refactor backlog. (Issue #123)
sonar.cpd.exclusions=src/locale.ts

# S3735 ("void operator should not be used") fires on the deliberate
# void-floating-promise pattern that typescript-eslint's
# no-floating-promises rule actively requires. The TypeScript
# ecosystem standard is `void somePromise()` for explicitly ignored
# floats; the same `void err` shorthand also marks "we know about
# this binding and chose to ignore it" in catch blocks. Suppressing
# Sonar's rule project-wide rather than going to war with each call
# site. (Issue #57.)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3735
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts
