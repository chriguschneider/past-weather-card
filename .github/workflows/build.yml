name: Build & Lint

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release needs contents:write to create or
      # update the GitHub Release on tag push. The repo default is
      # contents:read since GitHub tightened workflow permissions.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage gate
        # Fails the build if any of statements / branches / functions /
        # lines drops below the threshold configured in vitest.config.js.
        # Scope is the modules listed there — main.js / editor / chart
        # orchestration are deferred to v1.3 (Playwright E2E).
        run: npm run coverage

      - name: Build
        run: npm run rollup

      - name: Bundle budget
        # Hard cap at 800 KB (current ~355 KB minified). Tripping this
        # signals a regression in tree-shaking or an accidental large
        # dep — investigate before merging.
        run: |
          size=$(wc -c < dist/weather-station-card.js)
          limit=$((800 * 1024))
          echo "dist/weather-station-card.js: $size bytes (limit: $limit)"
          if [ "$size" -gt "$limit" ]; then
            echo "::error::Bundle exceeds 800 KB budget."
            exit 1
          fi

      - name: Verify committed bundle matches source
        run: |
          if ! git diff --quiet -- dist/weather-station-card.js; then
            echo "::error::dist/weather-station-card.js is out of sync with source. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist/weather-station-card.js
            exit 1
          fi

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version $pkg."
            exit 1
          fi

      - name: Upload bundle to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/weather-station-card.js
