name: Update E2E Baselines

# Manually-triggered workflow that regenerates the Playwright visual
# regression baselines on the actual GHA Linux runner and commits the
# result back to the branch the workflow ran on. Use it whenever a
# deliberate UI change has shifted what the card renders — saves the
# round-trip of generating baselines locally (in WSL) and discovering
# they still diff because of subpixel-rendering differences between
# WSL2's GPU virtualization and the GHA container.
#
# Trigger:
#   - GitHub UI: Actions → Update E2E Baselines → Run workflow → pick branch
#   - CLI: `gh workflow run update-baselines.yml --ref <branch>`
#
# After the run, the actor's branch has a fresh
# "chore: update e2e baselines from CI" commit on top with the
# regenerated PNGs under tests-e2e/snapshots/. Pull, review the diff,
# and merge as part of the PR / release.

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      # Required so GITHUB_TOKEN can push the bot commit back to the
      # branch — repo default since the 2022 permissions tightening
      # is contents:read.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fetch the full ref so the bot's push goes to the same
          # branch the workflow was dispatched on.
          ref: ${{ github.ref }}
          # `persist-credentials: true` is the default — leaves the
          # GITHUB_TOKEN in `~/.git-credentials` so the post-checkout
          # `git push` step uses it.

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build bundle
        # Visual baselines load the bundle from /dist; build it fresh
        # so the regenerated baselines reflect the source HEAD, not
        # whatever bundle was committed last.
        run: npm run rollup

      - name: Regenerate baselines
        run: npx playwright test --update-snapshots

      - name: Commit + push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add tests-e2e/snapshots
          if git diff --cached --quiet; then
            echo "No baseline changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore: update e2e baselines from CI

Regenerated by .github/workflows/update-baselines.yml on
\${{ github.ref_name }} at run \${{ github.run_id }}.

Co-Authored-By: github-actions[bot] <noreply@github.com>"
          git push
